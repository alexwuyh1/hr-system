# DevTools 热重载配置
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=500ms

# 静态资源即时刷新（不触发重启）
spring.devtools.livereload.enabled=true
spring.devtools.livereload.port=35729

# 监控额外路径
spring.devtools.restart.additional-paths=src/main/resources/static

# 排除不需要监控的路径
spring.devtools.restart.exclude=static/**,public/**

# 静态资源直接从源目录读取（开发环境热更新）
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/

# 禁用静态资源缓存
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# 数据库配置 - H2
spring.datasource.url=jdbc:h2:file:./data/hr;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway - 暂禁用（已切换 H2，schema 由 JPA ddl-auto=update 管理）
spring.flyway.enabled=false

# JWT 配置
app.auth.jwt-secret=HRSystemSecretKey2024VeryLongSecretKeyForHS256Algorithm
app.auth.jwt-expire-minutes=1440

# 服务器端口
server.port=18080
