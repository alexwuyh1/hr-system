<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HR 管理系统</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div>
          <p class="kicker">HR SUITE</p>
          <h1>人事管理系统</h1>
          <p class="subtitle">员工、考勤、薪资与报表在一个清爽的工作台完成。</p>
        </div>
        <div class="stats" id="report-cards">
          <div class="stat">
            <span class="label">员工总数</span>
            <span class="value" id="stat-total">-</span>
          </div>
          <div class="stat">
            <span class="label">今日考勤</span>
            <span class="value" id="stat-attendance">-</span>
          </div>
          <div class="stat">
            <span class="label">薪资合计</span>
            <span class="value" id="stat-payroll">-</span>
          </div>
        </div>
      </header>

      <section class="panel" id="auth-panel">
        <div class="panel-header">
          <h2>登录</h2>
          <p>默认管理员：admin / admin123</p>
        </div>
        <form id="login-form" class="grid-2">
          <label>
            用户名
            <input name="username" placeholder="输入用户名" required />
          </label>
          <label>
            密码
            <input name="password" type="password" placeholder="输入密码" required />
          </label>
          <button type="submit">登录</button>
          <button type="button" id="register-btn" class="ghost">注册新用户</button>
        </form>
      </section>

      <section class="workspace hidden" id="workspace">
        <nav class="tabs">
          <button data-tab="employees" class="active">员工管理</button>
          <button data-tab="attendance">考勤管理</button>
          <button data-tab="salary">薪资管理</button>
          <button data-tab="report">报表</button>
          <button id="logout" class="ghost">退出</button>
        </nav>

        <div class="tab-content active" id="tab-employees">
          <div class="panel">
            <div class="panel-header">
              <h2>员工信息</h2>
              <p>支持新增、修改、删除</p>
            </div>
            <form id="employee-form" class="grid-3">
              <input name="employeeNo" placeholder="工号" required />
              <input name="name" placeholder="姓名" required />
              <input name="department" placeholder="部门" required />
              <input name="title" placeholder="职位" required />
              <input name="phone" placeholder="电话" />
              <input name="email" placeholder="邮箱" />
              <input name="hireDate" type="date" required />
              <input name="status" placeholder="状态" value="Active" required />
              <button type="submit">保存</button>
            </form>
          </div>
          <div class="table-panel">
            <table id="employee-table">
              <thead>
                <tr>
                  <th>工号</th>
                  <th>姓名</th>
                  <th>部门</th>
                  <th>职位</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="tab-content" id="tab-attendance">
          <div class="panel">
            <div class="panel-header">
              <h2>考勤记录</h2>
              <p>记录每日出勤情况</p>
            </div>
            <form id="attendance-form" class="grid-3">
              <input name="employeeId" placeholder="员工ID" required />
              <input name="workDate" type="date" required />
              <input name="checkIn" type="time" />
              <input name="checkOut" type="time" />
              <input name="status" placeholder="状态" value="Normal" required />
              <input name="note" placeholder="备注" />
              <button type="submit">保存</button>
            </form>
          </div>
          <div class="table-panel">
            <table id="attendance-table">
              <thead>
                <tr>
                  <th>员工</th>
                  <th>日期</th>
                  <th>签到</th>
                  <th>签退</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="tab-content" id="tab-salary">
          <div class="panel">
            <div class="panel-header">
              <h2>薪资记录</h2>
              <p>按月管理员工薪资</p>
            </div>
            <form id="salary-form" class="grid-3">
              <input name="employeeId" placeholder="员工ID" required />
              <input name="salaryMonth" placeholder="YYYY-MM" required />
              <input name="baseSalary" type="number" step="0.01" placeholder="基本薪资" required />
              <input name="bonus" type="number" step="0.01" placeholder="奖金" required />
              <input name="deduction" type="number" step="0.01" placeholder="扣款" required />
              <input name="note" placeholder="备注" />
              <button type="submit">保存</button>
            </form>
          </div>
          <div class="table-panel">
            <table id="salary-table">
              <thead>
                <tr>
                  <th>员工</th>
                  <th>月份</th>
                  <th>基本</th>
                  <th>奖金</th>
                  <th>扣款</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="tab-content" id="tab-report">
          <div class="panel">
            <div class="panel-header">
              <h2>报表生成</h2>
              <p>一键刷新统计数据</p>
            </div>
            <button id="refresh-report">刷新报表</button>
            <div class="report-grid">
              <div class="stat">
                <span class="label">员工总数</span>
                <span class="value" id="report-total">-</span>
              </div>
              <div class="stat">
                <span class="label">今日考勤</span>
                <span class="value" id="report-attendance">-</span>
              </div>
              <div class="stat">
                <span class="label">薪资合计</span>
                <span class="value" id="report-payroll">-</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
