<div class="panel">
  <div class="panel-header">
    <h2>组织配置</h2>
    <p>维护部门树、岗位与职级</p>
  </div>
  <form id="dept-form" class="grid-4 form-fields">
    <div class="stat">
      <label for="dept-name-input">部门名称</label>
      <input id="dept-name-input" name="deptName" placeholder="输入部门名称" />
    </div>
    <div class="stat">
      <label for="dept-parent-select">上级部门</label>
      <select id="dept-parent-select" name="parentId"></select>
    </div>
    <div class="stat">
      <label for="grade-name-input">职级名称</label>
      <input id="grade-name-input" name="gradeName" placeholder="输入职级名称" />
    </div>
    <div class="stat">
      <label for="grade-level-input">等级</label>
      <input id="grade-level-input" name="gradeLevel" type="number" placeholder="输入等级" />
    </div>
    <div class="stat">
      <label for="pos-name-input">岗位名称</label>
      <input id="pos-name-input" name="posName" placeholder="输入岗位名称" />
    </div>
  </form>
  <form id="dept-actions" class="form-actions">
    <button id="dept-add" type="button" form="dept-form">新增部门</button>
    <button id="grade-add" type="button" form="dept-form">新增职级</button>
    <button id="pos-add" type="button" form="dept-form">新增岗位</button>
  </form>
</div>
<div class="panel">
  <div class="panel-header">
    <h3>组织结构树</h3>
    <p>支持折叠/展开</p>
  </div>
  <div id="dept-tree"></div>
</div>
<div class="table-panel">
  <table id="dept-table">
    <thead>
      <tr>
        <th>部门</th>
        <th>上级部门</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<div class="table-panel">
  <table id="pos-table">
    <thead>
      <tr>
        <th>岗位</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<div class="table-panel">
  <table id="grade-table">
    <thead>
      <tr>
        <th>职级</th>
        <th>等级</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
