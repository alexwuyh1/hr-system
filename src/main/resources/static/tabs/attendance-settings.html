<div class="panel">
  <div class="panel-header">
    <h2>考勤设置</h2>
    <p>配置标准工时、考勤规则，并触发自动计算</p>
  </div>
  <form id="attendance-settings-form" class="form-fields">
    <h3>标准工时</h3>
    <div class="grid-4">
      <div class="stat">
        <label for="rule-start-time">上班时间</label>
        <input id="rule-start-time" type="time" />
      </div>
      <div class="stat">
        <label for="rule-end-time">下班时间</label>
        <input id="rule-end-time" type="time" />
      </div>
    </div>
    <h3>考勤规则</h3>
    <div class="grid-4">
      <div class="stat">
        <label for="rule-late">迟到宽容（分钟）</label>
        <input id="rule-late" type="number" />
      </div>
      <div class="stat">
        <label for="rule-absent">旷工阈值（分钟）</label>
        <input id="rule-absent" type="number" />
      </div>
    </div>
    <h3>计算</h3>
    <div class="grid-4">
      <div class="stat">
        <label for="rule-date">计算日期</label>
        <input id="rule-date" type="date" />
      </div>
      <div class="stat">
        <label for="rule-start">起始日期</label>
        <input id="rule-start" type="date" />
      </div>
      <div class="stat">
        <label for="rule-end">结束日期</label>
        <input id="rule-end" type="date" />
      </div>
    </div>
  </form>
  <form id="attendance-settings-actions" class="form-actions">
    <button id="rule-save" type="button" form="attendance-settings-form">保存规则</button>
    <button id="rule-calc" type="button" form="attendance-settings-form">执行计算</button>
    <button id="rule-calc-range" type="button" form="attendance-settings-form">计算区间</button>
  </form>
  <p id="rule-result" class="subtitle"></p>
</div>
