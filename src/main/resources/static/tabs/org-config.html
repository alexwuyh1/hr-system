<div class="panel">
  <div class="panel-header">
    <h2>组织配置</h2>
    <p>维护部门树、岗位与职级</p>
  </div>
  <div class="panel-actions">
    <button id="org-dept-add-btn">新增部门</button>
    <button id="org-grade-add-btn">新增职级</button>
    <button id="org-pos-add-btn">新增岗位</button>
  </div>
</div>
<div class="panel">
  <div class="panel-header">
    <h3>组织结构树</h3>
    <p>支持折叠/展开</p>
  </div>
  <div id="dept-tree"></div>
</div>
<div class="table-panel">
  <table id="dept-table">
    <thead>
      <tr>
        <th>部门</th>
        <th>上级部门</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<div class="table-panel">
  <table id="pos-table">
    <thead>
      <tr>
        <th>岗位</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<div class="table-panel">
  <table id="grade-table">
    <thead>
      <tr>
        <th>职级</th>
        <th>等级</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
