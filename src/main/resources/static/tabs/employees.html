<div class="panel">
  <div class="panel-header">
    <h2>员工管理</h2>
    <p>支持新增、修改、删除</p>
  </div>
  <form id="employee-form" class="grid-4 form-fields">
    <div class="stat">
      <label for="employee-no">工号</label>
      <input id="employee-no" name="employeeNo" placeholder="输入工号" required />
    </div>
    <div class="stat">
      <label for="employee-name">姓名</label>
      <input id="employee-name" name="name" placeholder="输入姓名" required />
    </div>
    <div class="stat">
      <label for="employee-dept">部门</label>
      <select id="employee-dept" name="department" required></select>
    </div>
    <div class="stat">
      <label for="employee-pos">职位</label>
      <select id="employee-pos" name="title" required></select>
    </div>
    <div class="stat">
      <label for="employee-grade">职级</label>
      <select id="employee-grade" required></select>
    </div>
    <div class="stat">
      <label for="employee-hire">入职日期</label>
      <input id="employee-hire" name="hireDate" type="date" required />
    </div>
    <div class="stat">
      <label for="employee-manager">直属上级ID</label>
      <input id="employee-manager" name="managerId" placeholder="输入上级ID（可选）" />
    </div>
    <div class="stat">
      <input type="hidden" name="department" />
      <input type="hidden" name="title" />
    </div>
  </form>
  <form id="employee-actions" class="form-actions">
    <button type="submit" form="employee-form">入职</button>
  </form>
</div>
<div class="table-panel">
  <table id="employee-table">
    <thead>
      <tr>
        <th>工号</th>
        <th>姓名</th>
        <th>部门</th>
        <th>职位</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
