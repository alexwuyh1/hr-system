<div class="panel">
  <div class="panel-header">
    <h2>薪资记录</h2>
    <p>按月管理员工薪资</p>
  </div>
  <form id="salary-form" class="grid-4 form-fields">
    <div class="stat">
      <label for="salary-employee">员工</label>
      <select id="salary-employee" name="employeeId" required></select>
    </div>
    <div class="stat">
      <label for="salary-month">薪资日期</label>
      <input id="salary-month" name="salaryMonth" placeholder="输入薪资日期" type="month" required />
    </div>
    <div class="stat">
      <label for="salary-base">基本薪资</label>
      <input id="salary-base" name="baseSalary" type="number" step="0.01" placeholder="输入基本薪资" required />
    </div>
    <div class="stat">
      <label for="salary-bonus">奖金</label>
      <input id="salary-bonus" name="bonus" type="number" step="0.01" placeholder="输入奖金" required />
    </div>
    <div class="stat">
      <label for="salary-deduction">扣款</label>
      <input id="salary-deduction" name="deduction" type="number" step="0.01" placeholder="输入扣款" required />
    </div>
  </form>
  <form id="salary-actions" class="form-actions">
    <button type="submit" form="salary-form">保存</button>
  </form>
</div>
<div class="table-panel">
  <table id="salary-table">
    <thead>
      <tr>
        <th>员工</th>
        <th>月份</th>
        <th>基本</th>
        <th>奖金</th>
        <th>扣款</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
