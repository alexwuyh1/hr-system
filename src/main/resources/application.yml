server:
  port: 18080

spring:
  mvc:
    static-path-pattern: /**
  resources:
    static-locations: classpath:/static/
    cache-period: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:sqlite:./data/hr.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

app:
  auth:
    # JWT secret should be long and random in production
    jwt-secret: "change-this-secret-to-a-long-random-string"
    jwt-expire-minutes: 120
