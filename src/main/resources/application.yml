server:
  port: 18080

spring:
  datasource:
    url: jdbc:sqlite:./data/hr.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

app:
  auth:
    # Simple in-memory token expiration (minutes)
    token-expire-minutes: 120
